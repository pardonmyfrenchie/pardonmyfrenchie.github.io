<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #080808; --mint: #a8d5c2; --ink: #c8c4bc; --ink-soft: #555048; --card: #0f0f0f; }
        body { background: var(--bg); color: var(--ink); font-family: 'Outfit', sans-serif; padding: 2rem; overflow-x: hidden; }
        
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; max-width: 1200px; margin: 0 auto; }
        .game-card { background: var(--card); border-radius: 8px; overflow: hidden; text-decoration: none; color: inherit; transition: all 0.3s ease; display: flex; flex-direction: column; border: 1px solid #1a1a1a; }
        .game-card:hover { border-color: #333; transform: translateY(-5px); }
        .cover { height: 200px; background-size: cover; background-position: center; }
        .card-info { padding: 1.2rem; flex: 1; }
        .card-title { font-size: 1.2rem; font-weight: 300; margin-bottom: 0.5rem; }
        .platform-badge { font-size: 0.55rem; padding: 0.2rem 0.5rem; border: 1px solid #333; border-radius: 4px; color: var(--ink-soft); margin-right: 5px; }
        .btn { margin-top: 1rem; padding: 0.7rem; text-align: center; border-radius: 4px; font-weight: 500; text-transform: uppercase; font-size: 0.65rem; }
        .btn-primary { background: var(--mint); color: #000; }
        .btn-disabled { background: #1a1a1a; color: #444; }
    </style>
</head>
<body>
    <div class="games-grid">
        <a href="someone.html" class="game-card">
            <div class="cover" style="background-image: url('https://picsum.photos/id/1015/800/600')"></div>
            <div class="card-info">
                <h2 class="card-title">Someone.</h2>
                <div><span class="platform-badge">Android</span></div>
                <div class="btn btn-primary">View Details</div>
            </div>
        </a>
        <div class="game-card">
            <div class="cover" style="background-image: url('https://picsum.photos/id/201/800/600')"></div>
            <div class="card-info">
                <h2 class="card-title">Welcome to Hollywood</h2>
                <div><span class="platform-badge">TBD</span></div>
                <div class="btn btn-disabled">In Development</div>
            </div>
        </div>
    </div>
</body>
</html>
