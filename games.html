<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #080808; --mint: #a8d5c2; --ink: #c8c4bc; --ink-soft: #555048; --line: #1a1a1a; }
        body { background: var(--bg); color: var(--ink); font-family: 'Outfit', sans-serif; padding: 2rem; overflow-x: hidden; }
        
        .games-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 2rem; 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        .game-card { 
            background: #111; 
            border-radius: 24px; 
            overflow: hidden; 
            text-decoration: none; 
            color: inherit; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            position: relative;
            aspect-ratio: 4/5;
        }

        .game-card:hover { transform: translateY(-10px); border-color: var(--mint); }

        .cover-img { 
            position: absolute;
            inset: 0;
            background-size: cover; 
            background-position: center;
            z-index: 1;
        }

        /* Glassmorphism Card Overlay */
        .card-content { 
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            padding: 1.2rem; 
            z-index: 2;
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
        }
        
        .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
        
        .icon-group { display: flex; gap: 10px; color: var(--mint); font-size: 0.8rem; }
        .price-pill { 
            font-size: 0.6rem; 
            background: var(--mint); 
            color: #000; 
            padding: 2px 8px; 
            border-radius: 10px; 
            font-weight: 700; 
            letter-spacing: 0.05em;
        }

        .card-title { font-size: 1.2rem; font-weight: 500; margin-bottom: 0.2rem; color: #fff; }
        .card-genre { font-size: 0.7rem; color: rgba(200, 196, 188, 0.7); margin-bottom: 1rem; }

        .btn-mini { 
            padding: 0.6rem; 
            text-align: center; 
            border-radius: 12px; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.6rem; 
            letter-spacing: 0.1em;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--mint);
            transition: all 0.3s;
        }
        
        .game-card:hover .btn-mini {
            background: var(--mint);
            color: #000;
        }

        .coming-soon { filter: grayscale(1) opacity(0.6); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="games-grid">
        <a href="someone.html" class="game-card">
            <div class="cover-img" style="background-image: url('https://picsum.photos/id/1015/600/800')"></div>
            <div class="card-content">
                <div class="meta-row">
                    <div class="icon-group">
                        <i class="fab fa-android" title="Android"></i>
                        <span style="font-size: 0.65rem; border: 1px solid var(--mint); padding: 0 4px; border-radius: 3px;">12+</span>
                    </div>
                    <span class="price-pill">FREE</span>
                </div>
                <h2 class="card-title">Someone.</h2>
                <p class="card-genre">Life Simulation</p>
                <div class="btn-mini">See More</div>
            </div>
        </a>

        <div class="game-card coming-soon">
            <div class="cover-img" style="background-image: url('https://picsum.photos/id/201/600/800')"></div>
            <div class="card-content">
                <div class="meta-row">
                    <div class="icon-group">
                        <i class="fas fa-camera"></i>
                    </div>
                </div>
                <h2 class="card-title">Hollywood</h2>
                <p class="card-genre">Photography Sim</p>
                <div class="btn-mini">Details</div>
            </div>
        </div>
    </div>
</body>
</html>
